# ============================================================
# Model Architecture Configuration
# ============================================================

wake_word_model:
  # CNN layers
  conv_channels: [32, 64]
  conv_kernel_size: 3
  pool_kernel_size: 2
  conv_dropout: 0.25

  # GRU layers
  gru_hidden_size: 128
  gru_num_layers: 2
  gru_bidirectional: true
  gru_dropout: 0.30

  # Input
  n_mfcc: 40
  max_frames: 98              # ~1 second @ 16kHz, hop_length=160

  # Output
  num_classes: 1              # binary: wake / non-wake

intent_model:
  base_model: "bert-base-uncased"
  num_labels: 30
  max_length: 128
  hidden_dropout_prob: 0.1
  attention_probs_dropout_prob: 0.1
  classifier_dropout: 0.20
